name: Unit Test

on:
    push:
        branches:
            - master
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: write

jobs:
    frontend:
        name: Vitest
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: 24.x
                  cache: npm
            - run: npm install
            - run: npm run test -- --coverage
            - uses: actions/upload-artifact@v7
              with:
                  name: ts-coverage-summary
                  path: coverage/coverage-summary.json
                  if-no-files-found: error
                  retention-days: 7

    rust-coverage:
        name: Rust Coverage
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v5
            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                      clang \
                      cmake \
                      g++ \
                      libclang-dev \
                      libwebkit2gtk-4.1-dev \
                      libgtk-3-dev \
                      libayatana-appindicator3-dev \
                      librsvg2-dev
            - uses: dtolnay/rust-toolchain@stable
              with:
                  components: llvm-tools-preview
            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: . -> target
            - uses: taiki-e/install-action@cargo-llvm-cov
            - name: Generate coverage report
              run: cargo llvm-cov --workspace --exclude vrcx-0 --locked --json --summary-only > rust-coverage-summary.json
            - uses: actions/upload-artifact@v7
              with:
                  name: rust-coverage-summary
                  path: rust-coverage-summary.json
                  if-no-files-found: error
                  retention-days: 7

    combined-coverage:
        name: Combined Coverage Badge
        runs-on: ubuntu-latest
        needs:
            - frontend
            - rust-coverage
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: 24.x
            - uses: actions/download-artifact@v8
              with:
                  name: ts-coverage-summary
                  path: coverage-artifacts/ts
            - uses: actions/download-artifact@v8
              with:
                  name: rust-coverage-summary
                  path: coverage-artifacts/rust
            - name: Generate combined coverage badge
              run: |
                  node <<'NODE'
                  const fs = require('node:fs');

                  const ts = JSON.parse(fs.readFileSync('coverage-artifacts/ts/coverage-summary.json', 'utf8'));
                  const rust = JSON.parse(fs.readFileSync('coverage-artifacts/rust/rust-coverage-summary.json', 'utf8'));

                  const tsLines = ts.total.lines;
                  const rustLines = rust.data[0].totals.lines;
                  const covered = tsLines.covered + rustLines.covered;
                  const total = tsLines.total + rustLines.count;
                  const pct = (covered / total) * 100;
                  const color = pct >= 80 ? 'brightgreen' : pct >= 50 ? 'yellow' : 'red';

                  fs.writeFileSync(
                      'coverage.json',
                      JSON.stringify({
                          schemaVersion: 1,
                          label: 'coverage',
                          message: pct.toFixed(1) + '%',
                          color
                      }) + '\n'
                  );
                  NODE
            - name: Publish coverage badge to badge-data branch
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  work="$(mktemp -d)"
                  cd "$work"
                  git init -q
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  repo_url="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
                  if git fetch -q "$repo_url" badge-data 2>/dev/null; then
                      git checkout -q -b badge-data FETCH_HEAD
                  else
                      git checkout -q --orphan badge-data
                      git rm -rf . --quiet 2>/dev/null || true
                  fi
                  cp "$GITHUB_WORKSPACE/coverage.json" coverage.json
                  git rm -f --ignore-unmatch rust-coverage.json
                  git add coverage.json
                  git diff --cached --quiet && exit 0
                  git commit -q -m "chore(badge): coverage"
                  git push -q -f "$repo_url" badge-data

    rust-windows:
        name: Rust Backend (Windows)
        runs-on: windows-latest
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v5
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: . -> target
            - run: npm run rust:test

    rust-linux:
        name: Rust Backend (Linux)
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v5
            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                      clang \
                      cmake \
                      g++ \
                      libclang-dev \
                      libwebkit2gtk-4.1-dev \
                      libgtk-3-dev \
                      libayatana-appindicator3-dev \
                      librsvg2-dev
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: . -> target
            - run: npm run rust:test

    rust-macos:
        name: Rust Backend (macOS)
        runs-on: macos-latest
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v5
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: . -> target
            - run: npm run rust:test

    tauri-bindings:
        name: Tauri Bindings Up-to-date
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v5
            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                      clang \
                      cmake \
                      g++ \
                      libclang-dev \
                      libwebkit2gtk-4.1-dev \
                      libgtk-3-dev \
                      libayatana-appindicator3-dev \
                      librsvg2-dev
            - uses: actions/setup-node@v5
              with:
                  node-version: 24.x
                  cache: npm
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: . -> target
            - run: npm ci
            # Backend crate needs the generated overlay locales to compile.
            - run: npm run generate:overlay-locales
            - run: npm run generate:tauri-bindings
            - name: Verify bindings.ts is regenerated
              run: git diff --exit-code src/platform/tauri/bindings.ts
