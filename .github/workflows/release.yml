name: Package

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Stable release version, for example 1.0.0'
                required: true
                type: string
                default: '1.0.0'

concurrency:
    group: ${{ github.ref }}-package
    cancel-in-progress: true

permissions:
    contents: write

jobs:
    prepare:
        name: Prepare release metadata
        runs-on: ubuntu-24.04
        outputs:
            base_version: ${{ steps.version.outputs.base_version }}
            build_version: ${{ steps.version.outputs.build_version }}
            display_version: ${{ steps.version.outputs.display_version }}
            tag: ${{ steps.version.outputs.tag }}
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24.x

            - id: version
              name: Validate release version
              run: |
                  node build-scripts/prepare-release-version.js \
                      --version "${{ inputs.version }}" \
                      --dry-run

    package:
        name: ${{ matrix.label }}
        needs: prepare
        runs-on: ${{ matrix.os }}
        defaults:
            run:
                shell: bash
        strategy:
            fail-fast: false
            matrix:
                include:
                    - label: Linux Packages
                      os: ubuntu-24.04
                      rust_target: ''
                      build_command: npm run tauri:build -- --config src-tauri/tauri.linux.conf.json --bundles appimage,deb,rpm
                      artifact_name: linux-packages
                      artifact_path: |
                          src-tauri/target/release/bundle/appimage/*.AppImage
                          src-tauri/target/release/bundle/appimage/*.AppImage.sig
                          src-tauri/target/release/bundle/deb/*.deb
                          src-tauri/target/release/bundle/deb/*.deb.sig
                          src-tauri/target/release/bundle/rpm/*.rpm
                          src-tauri/target/release/bundle/rpm/*.rpm.sig
                          src-tauri/target/release/bundle/latest_linux_and_macos.json
                    - label: macOS DMG (Apple Silicon)
                      os: macos-latest
                      rust_target: aarch64-apple-darwin
                      updater_target: macos-aarch64-stable
                      updater_asset_name: update_macos_aarch64.app.tar.gz
                      build_command: npm run tauri:build -- --target aarch64-apple-darwin --bundles app,dmg
                      artifact_name: macos-aarch64-dmg
                      artifact_path: |
                          src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
                          src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
                          src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
                    - label: macOS DMG (Intel)
                      os: macos-latest
                      rust_target: x86_64-apple-darwin
                      updater_target: macos-x86_64-stable
                      updater_asset_name: update_macos_x86_64.app.tar.gz
                      build_command: npm run tauri:build -- --target x86_64-apple-darwin --bundles app,dmg
                      artifact_name: macos-x86_64-dmg
                      artifact_path: |
                          src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
                          src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
                          src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
        steps:
            - uses: actions/checkout@v6

            - uses: dtolnay/rust-toolchain@stable

            - name: Install Rust target
              if: matrix.rust_target != ''
              run: rustup target add "${{ matrix.rust_target }}"

            - uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: npm

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri -> target

            - name: Install Linux dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      build-essential \
                      curl \
                      file \
                      libayatana-appindicator3-dev \
                      libgtk-3-dev \
                      librsvg2-dev \
                      libssl-dev \
                      libxdo-dev \
                      patchelf \
                      rpm \
                      wget
                  sudo apt-get install -y \
                      libwebkit2gtk-4.1-0=2.44.0-2 \
                      libwebkit2gtk-4.1-dev=2.44.0-2 \
                      libjavascriptcoregtk-4.1-0=2.44.0-2 \
                      libjavascriptcoregtk-4.1-dev=2.44.0-2 \
                      gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
                      gir1.2-webkit2-4.1=2.44.0-2

            - run: npm ci

            - name: Apply release version
              run: |
                  node build-scripts/prepare-release-version.js \
                      --version "${{ inputs.version }}"

            - name: Inject updater public key
              env:
                  TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
              run: |
                  if [[ -z "$TAURI_UPDATER_PUBLIC_KEY" ]]; then
                      echo "TAURI_UPDATER_PUBLIC_KEY repository variable is required for updater artifacts" >&2
                      exit 1
                  fi
                  node -e "const fs = require('node:fs'); const path = 'src-tauri/tauri.conf.json'; const config = JSON.parse(fs.readFileSync(path, 'utf8')); config.plugins ??= {}; config.plugins.updater ??= {}; config.plugins.updater.pubkey = process.env.TAURI_UPDATER_PUBLIC_KEY; fs.writeFileSync(path, JSON.stringify(config, null, 4) + '\n');"

            - name: Build package
              env:
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY_PASSWORD }}
                  TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
              run: ${{ matrix.build_command }}

            - name: Prepare Linux release and updater assets
              if: runner.os == 'Linux'
              run: |
                  bundle_dir="src-tauri/target/release/bundle"
                  manifest_path="$bundle_dir/latest_linux_and_macos.json"

                  find "$bundle_dir" -maxdepth 2 -type f | sort

                  rename_asset() {
                      local source="$1"
                      local destination="$2"
                      local source_signature="${source}.sig"
                      local destination_signature="${destination}.sig"

                      if [[ "$source" != "$destination" ]]; then
                          if [[ -e "$destination" ]]; then
                              echo "Target release asset already exists: $destination" >&2
                              exit 1
                          fi
                          mv "$source" "$destination"
                      fi

                      if [[ -f "$source_signature" && "$source_signature" != "$destination_signature" ]]; then
                          if [[ -e "$destination_signature" ]]; then
                              echo "Target release signature already exists: $destination_signature" >&2
                              exit 1
                          fi
                          mv "$source_signature" "$destination_signature"
                      fi

                      if [[ ! -f "$destination_signature" ]]; then
                          node node_modules/@tauri-apps/cli/tauri.js signer sign "$destination" > "$destination_signature"
                      fi
                      if [[ ! -s "$destination_signature" ]]; then
                          echo "No updater signature found at $destination_signature" >&2
                          exit 1
                      fi
                  }

                  appimage_source="$(find "$bundle_dir/appimage" -maxdepth 1 -name '*.AppImage' | sort | head -n 1)"
                  deb_source="$(find "$bundle_dir/deb" -maxdepth 1 -name '*.deb' | sort | head -n 1)"
                  rpm_source="$(find "$bundle_dir/rpm" -maxdepth 1 -name '*.rpm' | sort | head -n 1)"

                  if [[ -z "$appimage_source" || -z "$deb_source" || -z "$rpm_source" ]]; then
                      echo "Missing Linux release artifact. AppImage=$appimage_source deb=$deb_source rpm=$rpm_source" >&2
                      exit 1
                  fi

                  appimage_path="$bundle_dir/appimage/VRCX-0_${{ needs.prepare.outputs.build_version }}_linux_x86_64.AppImage"
                  deb_path="$bundle_dir/deb/VRCX-0_${{ needs.prepare.outputs.build_version }}_linux_x86_64.deb"
                  rpm_path="$bundle_dir/rpm/VRCX-0_${{ needs.prepare.outputs.build_version }}_linux_x86_64.rpm"

                  rename_asset "$appimage_source" "$appimage_path"
                  rename_asset "$deb_source" "$deb_path"
                  rename_asset "$rpm_source" "$rpm_path"

                  node build-scripts/create-tauri-updater-manifest.js \
                      --version "${{ needs.prepare.outputs.build_version }}" \
                      --tag "${{ needs.prepare.outputs.tag }}" \
                      --target "linux-x86_64-appimage-stable" \
                      --asset-name "$(basename "$appimage_path")" \
                      --signature-file "${appimage_path}.sig" \
                      --out "$manifest_path"
                  node build-scripts/create-tauri-updater-manifest.js \
                      --version "${{ needs.prepare.outputs.build_version }}" \
                      --tag "${{ needs.prepare.outputs.tag }}" \
                      --target "linux-x86_64-deb-stable" \
                      --asset-name "$(basename "$deb_path")" \
                      --signature-file "${deb_path}.sig" \
                      --base "$manifest_path" \
                      --out "$manifest_path"
                  node build-scripts/create-tauri-updater-manifest.js \
                      --version "${{ needs.prepare.outputs.build_version }}" \
                      --tag "${{ needs.prepare.outputs.tag }}" \
                      --target "linux-x86_64-rpm-stable" \
                      --asset-name "$(basename "$rpm_path")" \
                      --signature-file "${rpm_path}.sig" \
                      --base "$manifest_path" \
                      --out "$manifest_path"

            - name: Prepare macOS updater assets
              if: runner.os == 'macOS'
              run: |
                  updater_dir="src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos"
                  archive_path="$(find "$updater_dir" -maxdepth 1 -name '*.app.tar.gz' | sort | head -n 1)"
                  if [[ -z "$archive_path" ]]; then
                      echo "No macOS updater archive found in $updater_dir" >&2
                      exit 1
                  fi
                  signature_path="${archive_path}.sig"
                  if [[ ! -f "$signature_path" ]]; then
                      echo "No macOS updater signature found at $signature_path" >&2
                      exit 1
                  fi
                  renamed_archive="$updater_dir/${{ matrix.updater_asset_name }}"
                  mv "$archive_path" "$renamed_archive"
                  mv "$signature_path" "$renamed_archive.sig"

            - uses: actions/upload-artifact@v7
              with:
                  name: release-${{ matrix.artifact_name }}
                  path: ${{ matrix.artifact_path }}
                  if-no-files-found: error

    publish-draft:
        name: Upload draft release assets
        needs:
            - prepare
            - package
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v6

            - uses: actions/download-artifact@v7
              with:
                  path: release-assets
                  merge-multiple: true

            - name: Flatten release assets
              run: |
                  find release-assets -mindepth 2 -type f -print0 | while IFS= read -r -d '' file; do
                      destination="release-assets/$(basename "$file")"
                      if [[ -e "$destination" ]]; then
                          echo "Duplicate release asset basename: $destination" >&2
                          exit 1
                      fi
                      mv "$file" "$destination"
                  done
                  find release-assets -mindepth 1 -type d -empty -delete

            - name: List release assets
              run: find release-assets -type f | sort

            - name: Add macOS updater entries to Linux/macOS manifest
              run: |
                  manifest_path="release-assets/latest_linux_and_macos.json"
                  if [[ ! -f "$manifest_path" ]]; then
                      echo "No Linux/macOS updater manifest found at $manifest_path" >&2
                      exit 1
                  fi

                  for target in macos-aarch64-stable macos-x86_64-stable; do
                      archive_name="update_${target%-stable}.app.tar.gz"
                      archive_name="${archive_name//-/_}"
                      archive_path="release-assets/$archive_name"
                      if [[ ! -f "$archive_path" ]]; then
                          echo "No macOS updater archive found for $target" >&2
                          exit 1
                      fi
                      signature_path="${archive_path}.sig"
                      if [[ ! -f "$signature_path" ]]; then
                          echo "No macOS updater signature found at $signature_path" >&2
                          exit 1
                      fi
                      node build-scripts/create-tauri-updater-manifest.js \
                          --version "${{ needs.prepare.outputs.build_version }}" \
                          --tag "${{ needs.prepare.outputs.tag }}" \
                          --target "$target" \
                          --asset-name "$(basename "$archive_path")" \
                          --signature-file "$signature_path" \
                          --base "$manifest_path" \
                          --out "$manifest_path"
                  done

            - uses: softprops/action-gh-release@v3
              with:
                  tag_name: ${{ needs.prepare.outputs.tag }}
                  name: ${{ needs.prepare.outputs.display_version }}
                  body: Draft release for ${{ needs.prepare.outputs.display_version }}.
                  draft: true
                  files: release-assets/*
                  fail_on_unmatched_files: true
                  overwrite_files: true
