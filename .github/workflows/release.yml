name: Package

on:
    workflow_dispatch:
        inputs:
            channel:
                description: 'Release channel'
                required: true
                type: choice
                options:
                    - stable
                    - beta
                    - alpha
                default: stable
            beta_number:
                description: 'Beta suffix number (1, 2, 3...)'
                required: false
                type: string
                default: '1'
            alpha_number:
                description: 'Alpha suffix number (1, 2, 3...)'
                required: false
                type: string
                default: '1'

concurrency:
    group: ${{ github.ref }}-package
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    package:
        name: ${{ matrix.label }}
        runs-on: ${{ matrix.os }}
        defaults:
            run:
                shell: bash
        strategy:
            fail-fast: false
            matrix:
                include:
                    - label: Linux AppImage
                      os: ubuntu-24.04
                      rust_target: ''
                      build_command: npm run tauri:build -- --config src-tauri/tauri.linux.conf.json --bundles appimage
                      artifact_name: linux-appimage
                      artifact_path: |
                          src-tauri/target/release/bundle/appimage/*.AppImage
                          src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
                          src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig
                          src-tauri/target/release/bundle/appimage/vrcx-0-updater-linux-x86_64-*.json
                    - label: macOS DMG (Apple Silicon)
                      os: macos-15
                      rust_target: aarch64-apple-darwin
                      build_command: npm run tauri:build -- --target aarch64-apple-darwin --bundles dmg
                      artifact_name: macos-aarch64-dmg
                      artifact_path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
                    - label: macOS DMG (Intel)
                      os: macos-15-intel
                      rust_target: x86_64-apple-darwin
                      build_command: npm run tauri:build -- --target x86_64-apple-darwin --bundles dmg
                      artifact_name: macos-x86_64-dmg
                      artifact_path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
        steps:
            - uses: actions/checkout@v6

            - uses: dtolnay/rust-toolchain@stable

            - name: Install Rust target
              if: matrix.rust_target != ''
              run: rustup target add "${{ matrix.rust_target }}"

            - uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: npm

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri -> target

            - name: Install Linux dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      build-essential \
                      curl \
                      file \
                      libayatana-appindicator3-dev \
                      librsvg2-dev \
                      libssl-dev \
                      libwebkit2gtk-4.1-dev \
                      libxdo-dev \
                      patchelf \
                      wget

            - run: npm ci

            - id: version
              name: Prepare release version
              run: |
                  node build-scripts/prepare-release-version.js \
                      --channel "${{ inputs.channel }}" \
                      --beta-number "${{ inputs.beta_number }}" \
                      --alpha-number "${{ inputs.alpha_number }}"

            - name: Inject Linux updater public key
              if: runner.os == 'Linux'
              env:
                  TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
              run: |
                  if [[ -z "$TAURI_UPDATER_PUBLIC_KEY" ]]; then
                      echo "TAURI_UPDATER_PUBLIC_KEY repository variable is required for Linux updater artifacts" >&2
                      exit 1
                  fi
                  node -e "const fs = require('node:fs'); const path = 'src-tauri/tauri.conf.json'; const config = JSON.parse(fs.readFileSync(path, 'utf8')); config.plugins ??= {}; config.plugins.updater ??= {}; config.plugins.updater.pubkey = process.env.TAURI_UPDATER_PUBLIC_KEY; fs.writeFileSync(path, JSON.stringify(config, null, 4) + '\n');"

            - name: Build package
              env:
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY_PASSWORD }}
                  TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
              run: ${{ matrix.build_command }}

            - name: Create Linux updater manifest
              if: runner.os == 'Linux'
              run: |
                  appimage_path="$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' | sort | head -n 1)"
                  if [[ -z "$appimage_path" ]]; then
                      echo "No AppImage artifact found" >&2
                      exit 1
                  fi
                  updater_path="$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage.tar.gz' | sort | head -n 1)"
                  if [[ -z "$updater_path" ]]; then
                      echo "No AppImage updater archive found" >&2
                      exit 1
                  fi
                  signature_path="${updater_path}.sig"
                  if [[ ! -f "$signature_path" ]]; then
                      echo "No AppImage signature found at $signature_path" >&2
                      exit 1
                  fi
                  node build-scripts/create-tauri-updater-manifest.js \
                      --version "${{ steps.version.outputs.build_version }}" \
                      --tag "${{ steps.version.outputs.tag }}" \
                      --target "linux-x86_64-${{ inputs.channel }}" \
                      --asset-name "$(basename "$updater_path")" \
                      --signature-file "$signature_path" \
                      --out "src-tauri/target/release/bundle/appimage/vrcx-0-updater-linux-x86_64-${{ inputs.channel }}.json"

            - uses: actions/upload-artifact@v7
              with:
                  name: VRCX-0_${{ steps.version.outputs.display_version }}_${{ matrix.artifact_name }}
                  path: ${{ matrix.artifact_path }}
                  if-no-files-found: error
