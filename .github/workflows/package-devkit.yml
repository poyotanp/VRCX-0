name: Package Dev Kit

on:
    workflow_run:
        workflows: ['Package']
        types:
            - completed
    workflow_dispatch:

concurrency:
    group: ${{ github.ref }}-package-devkit
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    prepare:
        name: Prepare Dev Kit metadata
        runs-on: ubuntu-24.04
        if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
        outputs:
            timestamp: ${{ steps.timestamp.outputs.timestamp }}
        steps:
            - id: timestamp
              name: Generate Dev Kit timestamp
              run: |
                  node <<'NODE'
                  const fs = require('node:fs');

                  const timestampParts = new Intl.DateTimeFormat('en-US', {
                      timeZone: 'Asia/Tokyo',
                      year: 'numeric',
                      month: '2-digit',
                      day: '2-digit',
                      hour: '2-digit',
                      minute: '2-digit',
                      hourCycle: 'h23'
                  })
                      .formatToParts(new Date())
                      .reduce((parts, part) => {
                          parts[part.type] = part.value;
                          return parts;
                      }, {});
                  const devKitTimestamp = `${timestampParts.year}${timestampParts.month}${timestampParts.day}-${timestampParts.hour}${timestampParts.minute}`;

                  fs.appendFileSync(process.env.GITHUB_OUTPUT, `timestamp=${devKitTimestamp}\n`);
                  NODE

    package:
        name: Dev Kit ${{ matrix.platform }}
        needs: prepare
        runs-on: ${{ matrix.os }}
        defaults:
            run:
                shell: bash
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: windows_x86_64
                      os: windows-latest
                      rust_target: ''
                      output: VRCX-0_${version}_devkit_windows_x86_64.exe
                    - platform: linux_x86_64
                      os: ubuntu-24.04
                      rust_target: ''
                      output: VRCX-0_${version}_devkit_linux_x86_64.AppImage
                    - platform: macos_aarch64
                      os: macos-latest
                      rust_target: aarch64-apple-darwin
                      output: VRCX-0_${version}_devkit_macos_aarch64.dmg
                    - platform: macos_x86_64
                      os: macos-latest
                      rust_target: x86_64-apple-darwin
                      output: VRCX-0_${version}_devkit_macos_x86_64.dmg
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: dtolnay/rust-toolchain@stable

            - name: Install Rust target
              if: matrix.rust_target != ''
              run: rustup target add "${{ matrix.rust_target }}"

            - uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: npm

            - name: Install Linux dependencies
              if: runner.os == 'Linux'
              run: |
                  webkitgtk_version="2.44.0-2"

                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                      build-essential \
                      curl \
                      file \
                      libayatana-appindicator3-dev \
                      libssl-dev \
                      libxdo-dev \
                      librsvg2-dev \
                      patchelf \
                      rpm \
                      wget
                  sudo apt-get install -y --no-install-recommends \
                      libgtk-3-dev \
                      libwebkit2gtk-4.1-0="$webkitgtk_version" \
                      libwebkit2gtk-4.1-dev="$webkitgtk_version" \
                      libjavascriptcoregtk-4.1-0="$webkitgtk_version" \
                      libjavascriptcoregtk-4.1-dev="$webkitgtk_version" \
                      gir1.2-javascriptcoregtk-4.1="$webkitgtk_version" \
                      gir1.2-webkit2-4.1="$webkitgtk_version"

            - run: npm ci

            - id: version
              name: Read package version
              run: |
                  version="$(node -p "require('./src-tauri/tauri.conf.json').version")"

                  if [[ -z "$version" ]]; then
                      echo "Missing package version." >&2
                      exit 1
                  fi

                  echo "version=$version" >> "$GITHUB_OUTPUT"

            - name: Validate package version
              run: |
                  node build-scripts/prepare-release-version.ts \
                      --version "${{ steps.version.outputs.version }}" \
                      --dry-run

            - id: config
              name: Prepare Dev Kit config
              run: |
                  node <<'NODE'
                  const fs = require('node:fs');

                  const platform = process.env.MATRIX_PLATFORM;
                  const runnerOs = process.env.RUNNER_OS;
                  const tauriConfigPath = 'src-tauri/tauri.conf.json';
                  const linuxConfigPath = 'src-tauri/tauri.linux.conf.json';
                  const outputConfigPath = `src-tauri/tauri.devkit.${platform}.conf.json`;

                  const tauriConfig = JSON.parse(fs.readFileSync(tauriConfigPath, 'utf8'));
                  let config = structuredClone(tauriConfig);

                  if (runnerOs === 'Linux') {
                      const linuxConfig = JSON.parse(fs.readFileSync(linuxConfigPath, 'utf8'));
                      config = {
                          bundle: {
                              ...(linuxConfig.bundle ?? {}),
                              targets: ['appimage'],
                              createUpdaterArtifacts: false
                          }
                      };
                  } else {
                      config.bundle ??= {};
                      config.bundle.createUpdaterArtifacts = false;
                      if (runnerOs === 'Windows') {
                          config.bundle.windows ??= {};
                          delete config.bundle.windows.certificateThumbprint;
                          delete config.bundle.windows.signCommand;
                      }
                      if (runnerOs === 'macOS') {
                          config.bundle.targets = ['dmg'];
                      }
                  }

                  fs.writeFileSync(outputConfigPath, `${JSON.stringify(config, null, 4)}\n`);
                  fs.appendFileSync(process.env.GITHUB_OUTPUT, `config=${outputConfigPath}\n`);
                  NODE
              env:
                  MATRIX_PLATFORM: ${{ matrix.platform }}

            - name: Build Windows Dev Kit exe
              if: runner.os == 'Windows'
              env:
                  VRCX_0_BUILD_LABEL: devkit
                  VRCX_0_BUILD_BADGE: Dev Kit ${{ needs.prepare.outputs.timestamp }}
              run: |
                  npm run tauri:build:devkit -- \
                      --config "${{ steps.config.outputs.config }}" \
                      --no-sign \
                      --no-bundle

            - name: Build Linux Dev Kit AppImage
              if: runner.os == 'Linux'
              env:
                  VRCX_0_BUILD_LABEL: devkit
                  VRCX_0_BUILD_BADGE: Dev Kit ${{ needs.prepare.outputs.timestamp }}
              run: |
                  npm run tauri:build:devkit -- \
                      --config "${{ steps.config.outputs.config }}" \
                      --bundles appimage

            - name: Build macOS Dev Kit DMG
              if: runner.os == 'macOS'
              env:
                  VRCX_0_BUILD_LABEL: devkit
                  VRCX_0_BUILD_BADGE: Dev Kit ${{ needs.prepare.outputs.timestamp }}
              run: |
                  npm run tauri:build:devkit -- \
                      --target "${{ matrix.rust_target }}" \
                      --config "${{ steps.config.outputs.config }}" \
                      --bundles dmg

            - name: Collect Dev Kit artifact
              run: |
                  mkdir -p devkit-assets
                  version="${{ steps.version.outputs.version }}"
                  output="${{ matrix.output }}"
                  output="${output//\$\{version\}/$version}"

                  case "${{ matrix.platform }}" in
                      windows_x86_64)
                          cp target/release/vrcx-0.exe "devkit-assets/$output"
                          ;;
                      linux_x86_64)
                          cp target/release/bundle/appimage/*.AppImage "devkit-assets/$output"
                          ;;
                      macos_aarch64|macos_x86_64)
                          cp "target/${{ matrix.rust_target }}/release/bundle/dmg/"*.dmg "devkit-assets/$output"
                          ;;
                      *)
                          echo "Unknown platform: ${{ matrix.platform }}" >&2
                          exit 1
                          ;;
                  esac

                  ls -la devkit-assets

            - uses: actions/upload-artifact@v7
              with:
                  name: devkit-${{ matrix.platform }}-${{ steps.version.outputs.version }}
                  path: devkit-assets/*
                  if-no-files-found: error
