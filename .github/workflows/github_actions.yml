name: VRCX

on:
    - workflow_dispatch

concurrency:
    group: ${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    set_version:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
            date: ${{ steps.version.outputs.date }}
        steps:
            - uses: actions/checkout@v5
            - id: version
              run: |
                  version="$(cat Version)"
                  echo "version=${version}" >> "$GITHUB_OUTPUT"
                  echo "date=${version}" >> "$GITHUB_OUTPUT"

    build_node:
        runs-on: ubuntu-latest
        needs: set_version
        steps:
            - uses: actions/checkout@v5
            - name: Set version
              run: |
                  echo "${{ needs.set_version.outputs.version }}" > Version
                  cat Version
            - name: Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
            - name: Get npm cache directory
              id: npm-cache-dir
              shell: bash
              run: echo "dir=$(npm config get cache)" >> "$GITHUB_OUTPUT"
            - uses: actions/cache@v4
              with:
                  path: ${{ steps.npm-cache-dir.outputs.dir }}
                  key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-
            - name: Restore dependencies
              run: npm ci
            - name: Build Cef html
              run: npm run prod
            - name: Upload Cef html artifacts
              uses: actions/upload-artifact@v5
              with:
                  name: Cef-html
                  path: build/html

    build_windows_cef:
        runs-on: windows-latest
        needs: [set_version, build_node]
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v5
            - name: Setup .NET 10
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: '10.0.x'
            - name: Set version
              run: |
                  echo "${{ needs.set_version.outputs.version }}" > Version
                  echo "!define PRODUCT_VERSION_FROM_FILE \"${{ needs.set_version.outputs.date }}.0\"" > Installer/version_define.nsh
                  cat Version
            - uses: actions/cache@v4
              with:
                  path: ~/.nuget/packages
                  key: ${{ runner.os }}-nuget-${{ hashFiles('**/Dotnet/VRCX-Cef.csproj') }}
                  restore-keys: |
                      ${{ runner.os }}-nuget-
            - name: Build Cef .NET application
              run: dotnet build Dotnet/VRCX-Cef.csproj -p:Configuration=Release -p:WarningLevel=0 -p:Platform=x64 -p:PlatformTarget=x64 -p:RestorePackagesConfig=true -t:"Restore;Clean;Build" -m -a x64 --self-contained
            - name: Download Cef html artifacts
              uses: actions/download-artifact@v6
              with:
                  name: Cef-html
                  path: build/Cef/html
            - name: Install NSIS
              run: choco install nsis -y
            - name: Create NSIS installer
              uses: joncloud/makensis-action@v4
              with:
                  script-file: Installer/installer.nsi
                  additional-plugin-paths: Installer/Plugins
            - name: Rename setup
              run: |
                  file_name="VRCX_${{ needs.set_version.outputs.version }}_Setup.exe"
                  mv Installer/VRCX_Setup.exe "$file_name"
                  echo "Setup FileName: ${file_name}"
            - name: Upload Cef release artifacts
              uses: actions/upload-artifact@v5
              with:
                  name: Cef-Release
                  path: build/Cef
            - name: Upload setup artifact
              uses: actions/upload-artifact@v5
              with:
                  name: Cef-Setup
                  path: VRCX_${{ needs.set_version.outputs.version }}_Setup.exe

    create_zip:
        runs-on: ubuntu-latest
        needs: [set_version, build_windows_cef]
        steps:
            - name: Download Cef release artifacts
              uses: actions/download-artifact@v6
              with:
                  name: Cef-Release
                  path: build/Cef
            - name: Create zip
              run: |
                  python3 - <<'PY'
                  import os
                  import zipfile

                  version = "${{ needs.set_version.outputs.version }}"
                  output = f"VRCX_{version}.zip"
                  root = "build/Cef"

                  with zipfile.ZipFile(output, "w", zipfile.ZIP_DEFLATED) as zf:
                      for dirpath, _, filenames in os.walk(root):
                          for filename in filenames:
                              if filename.endswith((".log", ".pdb")):
                                  continue
                              full_path = os.path.join(dirpath, filename)
                              arcname = os.path.relpath(full_path, root)
                              zf.write(full_path, arcname)
                  PY
            - name: Upload zip artifact
              uses: actions/upload-artifact@v5
              with:
                  name: VRCX-Zip
                  path: VRCX_${{ needs.set_version.outputs.version }}.zip
